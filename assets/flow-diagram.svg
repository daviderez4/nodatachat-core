<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320">
  <rect width="1000" height="320" fill="#0a0a0f" rx="12"/>
  <text x="500" y="35" text-anchor="middle" fill="#6e7681" font-family="system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="2">HOW IT WORKS</text>
  <g transform="translate(50,70)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#0d1117" stroke="#00ffa3" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" fill="#00ffa3" font-family="monospace" font-size="11" font-weight="600">1. SENDER</text>
    <line x1="15" y1="38" x2="145" y2="38" stroke="#1a3a2a" stroke-width="0.5"/>
    <text x="80" y="58" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Encrypts locally</text>
    <text x="80" y="74" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">AES-256-GCM</text>
    <g transform="translate(62,82)"><path d="M 8,14 L 8,9 Q 8,3 18,3 Q 28,3 28,9 L 28,14" fill="none" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="13" width="30" height="20" rx="3" fill="none" stroke="#00ffa3" stroke-width="1.5"/><circle cx="18" cy="23" r="3" fill="#00ffa3" opacity="0.7"/></g>
  </g>
  <g transform="translate(215,115)"><line x1="0" y1="0" x2="70" y2="0" stroke="#00ffa3" stroke-width="1.5" stroke-dasharray="6,3"/><polygon points="72,-4 80,0 72,4" fill="#00ffa3" opacity="0.7"/><text x="40" y="-10" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">encrypted</text><text x="40" y="18" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">blob only</text></g>
  <g transform="translate(300,70)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" fill="#6e7681" font-family="monospace" font-size="11" font-weight="600">2. SERVER</text>
    <line x1="15" y1="38" x2="145" y2="38" stroke="#21262d" stroke-width="0.5"/>
    <text x="80" y="58" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Stores encrypted</text>
    <text x="80" y="74" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">blob (can't read)</text>
    <g transform="translate(58,82)"><ellipse cx="22" cy="12" rx="18" ry="10" fill="none" stroke="#6e7681" stroke-width="1.5"/><circle cx="22" cy="12" r="5" fill="none" stroke="#6e7681" stroke-width="1.5"/><line x1="6" y1="22" x2="38" y2="2" stroke="#ff6b6b" stroke-width="1.5" stroke-linecap="round"/></g>
  </g>
  <g transform="translate(465,115)"><line x1="0" y1="0" x2="70" y2="0" stroke="#00ffa3" stroke-width="1.5" stroke-dasharray="6,3"/><polygon points="72,-4 80,0 72,4" fill="#00ffa3" opacity="0.7"/><text x="40" y="-10" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">link shared</text><text x="40" y="18" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">#key in URL</text></g>
  <g transform="translate(550,70)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#0d1117" stroke="#00ffa3" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" fill="#00ffa3" font-family="monospace" font-size="11" font-weight="600">3. RECIPIENT</text>
    <line x1="15" y1="38" x2="145" y2="38" stroke="#1a3a2a" stroke-width="0.5"/>
    <text x="80" y="58" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Decrypts locally</text>
    <text x="80" y="74" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">using URL #key</text>
    <g transform="translate(62,82)"><path d="M 8,14 L 8,9 Q 8,3 18,3 Q 28,3 28,9 L 28,6" fill="none" stroke="#00ffa3" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="13" width="30" height="20" rx="3" fill="none" stroke="#00ffa3" stroke-width="1.5"/><circle cx="18" cy="23" r="3" fill="#28c840" opacity="0.7"/></g>
  </g>
  <g transform="translate(715,115)"><line x1="0" y1="0" x2="70" y2="0" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="6,3"/><polygon points="72,-4 80,0 72,4" fill="#ff6b6b" opacity="0.7"/><text x="40" y="-10" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">auto</text><text x="40" y="18" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">delete</text></g>
  <g transform="translate(800,70)">
    <rect x="0" y="0" width="150" height="110" rx="10" fill="#0d1117" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="75" y="28" text-anchor="middle" fill="#ff6b6b" font-family="monospace" font-size="11" font-weight="600">4. DESTROYED</text>
    <line x1="15" y1="38" x2="135" y2="38" stroke="#3d2020" stroke-width="0.5"/>
    <text x="75" y="58" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Blob deleted</text>
    <text x="75" y="74" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">Key was never</text>
    <text x="75" y="88" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="10">on server</text>
    <g transform="translate(62,90)"><path d="M 13,22 Q 5,15 8,8 Q 10,12 13,10 Q 11,4 16,0 Q 15,6 18,8 Q 20,5 21,8 Q 24,15 16,22 Z" fill="#ff6b6b" opacity="0.6"/></g>
  </g>
  <g transform="translate(50,210)">
    <rect x="0" y="0" width="900" height="85" rx="8" fill="#0d1117" stroke="#1a3a2a" stroke-width="1"/>
    <text x="20" y="25" fill="#00ffa3" font-family="monospace" font-size="12" font-weight="600">KEY INSIGHT</text>
    <text x="20" y="48" fill="#8b949e" font-family="monospace" font-size="11">The decryption key lives in the URL fragment (#...). Browsers never send fragments to servers.</text>
    <text x="20" y="68" fill="#8b949e" font-family="monospace" font-size="11">The server literally cannot decrypt your secret — even if compromised.</text>
  </g>
</svg>
