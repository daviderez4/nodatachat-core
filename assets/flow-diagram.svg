<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" role="img" aria-label="How NoData Protect works">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1f1a13"/><stop offset="1" stop-color="#1c1813"/></linearGradient>
    <radialGradient id="coreS" cx="0.5" cy="0.42" r="0.7"><stop offset="0" stop-color="#FFF8E2"/><stop offset="0.5" stop-color="#E2BB5C"/><stop offset="1" stop-color="#8B6914"/></radialGradient>
  </defs>

  <rect width="1000" height="340" rx="16" fill="#14110D"/>
  <rect x="0.5" y="0.5" width="999" height="339" rx="16" fill="none" stroke="#2a2419"/>
  <text x="500" y="40" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" letter-spacing="5" fill="#C8A24B">HOW IT WORKS · ENCRYPT ONCE · DECRYPT IN MEMORY</text>

  <!-- card 1: Your machine (encrypt) -->
  <g transform="translate(40,80)">
    <rect width="200" height="150" rx="13" fill="url(#paper)" stroke="#C8A24B" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" letter-spacing="1" fill="#C8A24B">1 · YOUR MACHINE</text>
    <line x1="18" y1="44" x2="182" y2="44" stroke="#2a2419"/>
    <text x="100" y="72" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="13" font-weight="600" fill="#F4EFE6">nodata encrypt</text>
    <text x="100" y="94" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9a907e">AES-256-GCM · local</text>
    <rect x="34" y="108" width="132" height="26" rx="6" fill="#0c0a07"/>
    <text x="100" y="125" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#E4C677">aes256gcm:v2:…</text>
  </g>

  <!-- arrow 1 -->
  <g transform="translate(248,155)"><line x1="0" y1="0" x2="62" y2="0" stroke="#C8A24B" stroke-width="1.6" stroke-dasharray="5,4"/><polygon points="62,-5 72,0 62,5" fill="#C8A24B"/><text x="36" y="-12" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6e6452">ciphertext</text><text x="36" y="20" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6e6452">on disk + git</text></g>

  <!-- card 2: NoData server (KEK) -->
  <g transform="translate(330,80)">
    <rect width="200" height="150" rx="13" fill="url(#paper)" stroke="#C8A24B" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" letter-spacing="1" fill="#C8A24B">2 · NODATA</text>
    <line x1="18" y1="44" x2="182" y2="44" stroke="#2a2419"/>
    <text x="100" y="72" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="13" font-weight="600" fill="#F4EFE6">wraps your key (KEK)</text>
    <text x="100" y="94" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9a907e">never sees plaintext</text>
    <polygon points="100,108 122,121 122,143 100,156 78,143 78,121" fill="url(#coreS)"/>
    <polygon points="100,108 122,121 122,143 100,156 78,143 78,121" fill="none" stroke="#FFF3CF" stroke-opacity="0.6" stroke-width="1"/>
  </g>

  <!-- arrow 2 -->
  <g transform="translate(538,155)"><line x1="0" y1="0" x2="62" y2="0" stroke="#C8A24B" stroke-width="1.6" stroke-dasharray="5,4"/><polygon points="62,-5 72,0 62,5" fill="#C8A24B"/><text x="36" y="-12" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6e6452">device-bound</text><text x="36" y="20" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6e6452">unwrap</text></g>

  <!-- card 3: Your app (RAM) -->
  <g transform="translate(620,80)">
    <rect width="200" height="150" rx="13" fill="url(#paper)" stroke="#C8A24B" stroke-opacity="0.28" stroke-width="1.5"/>
    <text x="100" y="32" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" letter-spacing="1" fill="#F4EFE6">3 · YOUR APP</text>
    <line x1="18" y1="44" x2="182" y2="44" stroke="#2a2419"/>
    <text x="100" y="72" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="13" font-weight="600" fill="#F4EFE6">nodata run -- …</text>
    <text x="100" y="94" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9a907e">decrypts to RAM only</text>
    <text x="100" y="124" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" fill="#C8A24B">process.env ✓ · disk ✗</text>
  </g>

  <!-- arrow 3 -->
  <g transform="translate(828,155)"><line x1="0" y1="0" x2="40" y2="0" stroke="#b5654d" stroke-width="1.6" stroke-dasharray="5,4"/><polygon points="40,-5 50,0 40,5" fill="#b5654d"/><text x="25" y="-12" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="9" fill="#6e6452">exit</text></g>

  <!-- card 4: vanished -->
  <g transform="translate(878,80)">
    <rect width="92" height="150" rx="13" fill="url(#paper)" stroke="#b5654d" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="46" y="32" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="10" font-weight="600" fill="#b5654d">GONE</text>
    <text x="46" y="78" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="11" fill="#9a907e">plaintext</text>
    <text x="46" y="96" text-anchor="middle" font-family="'Heebo',sans-serif" font-size="11" fill="#9a907e">vanishes</text>
    <text x="46" y="128" text-anchor="middle" font-size="18">🔥</text>
  </g>

  <!-- key insight -->
  <g transform="translate(40,250)">
    <rect width="920" height="76" rx="10" fill="#1c1813" stroke="#C8A24B" stroke-opacity="0.3"/>
    <text x="22" y="26" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="600" fill="#C8A24B">KEY INSIGHT</text>
    <text x="22" y="47" font-family="'Heebo',sans-serif" font-size="13" fill="#cfc6b5">The key is wrapped server-side and bound to your device — the file on disk is useless ciphertext.</text>
    <text x="22" y="65" font-family="'Heebo',sans-serif" font-size="13" fill="#cfc6b5">Plaintext only ever lives in RAM during runtime, and is never written back to disk.</text>
  </g>
</svg>
