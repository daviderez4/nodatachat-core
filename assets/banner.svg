<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-label="NoData — Information Access Processor">
  <symbol id="mark" viewBox="0 0 100 100">
    <mask id="mk">
      <rect x="15" y="15" width="70" height="70" rx="17" fill="#fff"/>
      <g fill="#000"><rect x="40" y="13" width="2.2" height="5"/><rect x="49" y="13" width="2.2" height="5"/><rect x="58" y="13" width="2.2" height="5"/><rect x="40" y="82" width="2.2" height="5"/><rect x="49" y="82" width="2.2" height="5"/><rect x="58" y="82" width="2.2" height="5"/><rect x="13" y="40" width="5" height="2.2"/><rect x="13" y="49" width="5" height="2.2"/><rect x="13" y="58" width="5" height="2.2"/><rect x="82" y="40" width="5" height="2.2"/><rect x="82" y="49" width="5" height="2.2"/><rect x="82" y="58" width="5" height="2.2"/></g>
      <rect x="0" y="47.25" width="100" height="5.5" fill="#000"/><circle cx="50" cy="50" r="18" fill="#000"/>
    </mask>
    <rect x="15" y="15" width="70" height="70" rx="17" fill="currentColor" mask="url(#mk)"/>
  </symbol>

  <rect width="1280" height="440" fill="#14110D"/>
  <g stroke="#C8A24B" stroke-width="1" opacity="0.05">
    <line x1="0" y1="70" x2="1280" y2="70"/><line x1="0" y1="130" x2="1280" y2="130"/><line x1="0" y1="310" x2="1280" y2="310"/><line x1="0" y1="370" x2="1280" y2="370"/>
  </g>
  <line x1="0" y1="165" x2="700" y2="165" stroke="#C8A24B" stroke-width="1.5" opacity="0.12"/>

  <!-- identity -->
  <use href="#mark" x="70" y="92" width="150" height="150" color="#C8A24B"/>
  <text x="252" y="178" font-family="Inter,system-ui,'Segoe UI',sans-serif" font-size="88" font-weight="800" letter-spacing="-3"><tspan fill="#F4EFE6">No</tspan><tspan fill="#C8A24B">Data</tspan></text>
  <text x="256" y="216" font-family="ui-monospace,Menlo,monospace" font-size="17" letter-spacing="3" fill="#9a907e">INFORMATION ACCESS PROCESSOR</text>
  <text x="256" y="256" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="26" fill="#C8A24B">We compute access, not permissions.</text>

  <!-- terminal: the open-core product (protect) -->
  <g transform="translate(760,84)">
    <rect x="0" y="0" width="450" height="190" rx="12" fill="#1c1813" stroke="#2a2419" stroke-width="1.5"/>
    <rect x="0" y="0" width="450" height="32" rx="12" fill="#221d16"/><rect x="0" y="20" width="450" height="12" fill="#221d16"/>
    <circle cx="20" cy="16" r="5" fill="#3a3128"/><circle cx="38" cy="16" r="5" fill="#3a3128"/><circle cx="56" cy="16" r="5" fill="#3a3128"/>
    <text x="225" y="20" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#6e6452">@nodatachat/protect</text>
    <text x="20" y="62" font-family="ui-monospace,Menlo,monospace" font-size="14"><tspan fill="#6e6452">$ </tspan><tspan fill="#C8A24B">npx @nodatachat/protect encrypt</tspan></text>
    <text x="20" y="98" font-family="ui-monospace,Menlo,monospace" font-size="13"><tspan fill="#9a907e">OPENAI_API_KEY=</tspan><tspan fill="#b5654d">sk-proj-Ax7Q…</tspan></text>
    <text x="20" y="118" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#5a5240">↓ AES-256-GCM · local · zero-knowledge</text>
    <text x="20" y="142" font-family="ui-monospace,Menlo,monospace" font-size="13"><tspan fill="#9a907e">OPENAI_API_KEY=</tspan><tspan fill="#E4C677">ndc_enc_7f3a8b…</tspan></text>
    <text x="20" y="170" font-family="ui-monospace,Menlo,monospace" font-size="11.5" fill="#6e6452">decrypted in memory only · every access proven</text>
  </g>

  <!-- footer -->
  <line x1="70" y1="340" x2="1210" y2="340" stroke="#2a2419" stroke-width="1"/>
  <text x="70" y="378" font-family="Inter,system-ui,sans-serif" font-size="16" fill="#F4EFE6"><tspan font-weight="700">Open core</tspan><tspan fill="#9a907e"> — your code stays on your machine · your secrets stay encrypted · every access is proven.</tspan></text>
  <text x="70" y="410" font-family="ui-monospace,Menlo,monospace" font-size="12" letter-spacing="1" fill="#5a5240">AES-256-GCM · RSA-OAEP-4096 · PBKDF2-SHA256 · HMAC-SHA256 proof chain</text>
</svg>
