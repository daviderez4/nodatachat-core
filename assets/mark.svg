<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="NoData — Information Access Processor">
  <!-- NoData mark · Counter-Form · the absence is the technology.
       Body = Processor (compute). Void = No Data Stored. Slot = data flows through, never remains.
       Single color. Void/flow/pins are TRUE negative space (background shows through). -->
  <mask id="nd-void">
    <rect x="15" y="15" width="70" height="70" rx="17" fill="#fff"/>
    <!-- minimal processor pin hints (cut from body) -->
    <g fill="#000">
      <rect x="40" y="13" width="2.2" height="5"/><rect x="49" y="13" width="2.2" height="5"/><rect x="58" y="13" width="2.2" height="5"/>
      <rect x="40" y="82" width="2.2" height="5"/><rect x="49" y="82" width="2.2" height="5"/><rect x="58" y="82" width="2.2" height="5"/>
      <rect x="13" y="40" width="5" height="2.2"/><rect x="13" y="49" width="5" height="2.2"/><rect x="13" y="58" width="5" height="2.2"/>
      <rect x="82" y="40" width="5" height="2.2"/><rect x="82" y="49" width="5" height="2.2"/><rect x="82" y="58" width="5" height="2.2"/>
    </g>
    <!-- flow: edge to edge, never remains -->
    <rect x="0" y="47.25" width="100" height="5.5" fill="#000"/>
    <!-- the void: empty by design -->
    <circle cx="50" cy="50" r="18" fill="#000"/>
  </mask>
  <rect x="15" y="15" width="70" height="70" rx="17" fill="#C8A24B" mask="url(#nd-void)"/>
</svg>
